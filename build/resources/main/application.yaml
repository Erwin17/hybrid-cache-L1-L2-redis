spring:
  application:
    name: hybrid-cache-L1-L2-redis
  data:
    redis:
      host: localhost
      port: 6379
      password: admin
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: redis
    redis:
      time-to-live: 86400000
      cache-null-values: false

  mongodb:
    uri: mongodb://admin:admin@localhost:27017/product_catalog_db?authSource=admin
    uuid-representation: standard